<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理员面板 - AI Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <script src="{{ url_for('static', filename='js/admin.js') }}" defer></script>
</head>
<body>
  <main class="admin-page">
    <section class="admin-shell" aria-labelledby="admin-title">
      <header class="admin-header">
        <a class="back-link" href="/chat" aria-label="返回聊天">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
          <span>返回聊天</span>
        </a>

        <div class="title-row">
          <div class="heading">
            <p class="eyebrow">管理员面板</p>
            <h1 id="admin-title">用户管理</h1>
          </div>

          <button class="primary-button" id="create-user-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
            <span>创建用户</span>
          </button>
        </div>
      </header>

      <div class="status" id="status" role="status" aria-live="polite"></div>

      <section class="panel" aria-label="用户列表">
        <div class="panel-toolbar">
          <div class="toolbar-meta">
            <span class="meta-number" id="user-count">0</span>
            <span>个用户</span>
            <span class="dot" aria-hidden="true"></span>
            <span>已选择 <strong id="selected-count">0</strong> 个</span>
          </div>

          <button class="danger-button" id="bulk-delete-button" type="button" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M6 6l1 14h10l1-14"></path>
              <path d="M10 11v5"></path>
              <path d="M14 11v5"></path>
            </svg>
            <span>删除所选</span>
          </button>
        </div>

        <div class="table-wrap">
          <table class="user-table">
            <thead>
              <tr>
                <th class="check-cell" scope="col">
                  <input id="select-all" type="checkbox" aria-label="选择全部用户">
                </th>
                <th scope="col">ID</th>
                <th scope="col">用户名</th>
                <th scope="col">权限</th>
                <th scope="col">创建时间</th>
                <th scope="col">更新时间</th>
                <th class="action-cell" scope="col">操作</th>
              </tr>
            </thead>
            <tbody id="users-body">
              <tr>
                <td colspan="7" class="empty-cell">正在加载用户</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <div class="modal-backdrop" id="create-modal" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="create-modal-title">
      <header class="modal-header">
        <div>
          <p class="eyebrow">创建用户</p>
          <h2 id="create-modal-title">新增普通用户</h2>
        </div>
        <button class="icon-button" id="close-modal-button" type="button" aria-label="关闭创建用户弹窗">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6L6 18"></path>
            <path d="M6 6l12 12"></path>
          </svg>
        </button>
      </header>

      <form class="modal-form" id="create-user-form">
        <div class="form-field">
          <label for="new-username">新用户名称</label>
          <input id="new-username" name="username" type="text" autocomplete="off" required>
        </div>

        <div class="form-field">
          <label for="new-password">密码</label>
          <input id="new-password" name="password" type="password" autocomplete="new-password" required>
        </div>

        <div class="modal-status" id="modal-status" role="status" aria-live="polite"></div>

        <div class="modal-actions">
          <button class="secondary-button" id="cancel-create-button" type="button">取消</button>
          <button class="primary-button" id="submit-create-button" type="submit">提交</button>
        </div>
      </form>
    </section>
  </div>
</body>
</html>
