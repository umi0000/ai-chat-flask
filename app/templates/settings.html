<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>账号设置 - AI Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
  <script src="{{ url_for('static', filename='js/settings.js') }}" defer></script>
</head>
<body>
  <main class="settings-page">
    <section class="settings-shell" aria-labelledby="settings-title">
      <header class="settings-header">
        <a class="back-link" href="/chat" aria-label="返回聊天">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
          <span>返回聊天</span>
        </a>

        <div class="heading">
          <p class="eyebrow">账号设置</p>
          <h1 id="settings-title">管理你的登录信息</h1>
          <p class="subtitle">修改成功后会退出当前登录，需要重新登录。</p>
        </div>
      </header>

      <div class="settings-card">
        <div class="account-line">
          <span class="avatar" id="user-avatar">U</span>
          <div class="account-meta">
            <span class="current-label">当前用户</span>
            <strong id="current-username">加载中</strong>
          </div>
          <button class="secondary-button" id="logout-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 17l5-5-5-5"></path>
              <path d="M15 12H3"></path>
              <path d="M21 19V5"></path>
            </svg>
            <span>登出</span>
          </button>
        </div>

        <div class="tabs" role="tablist" aria-label="账号设置选项">
          <button class="tab is-active" id="username-tab" type="button" role="tab" aria-selected="true" aria-controls="username-panel" data-tab="username">修改用户名</button>
          <button class="tab" id="password-tab" type="button" role="tab" aria-selected="false" aria-controls="password-panel" data-tab="password">修改密码</button>
        </div>

        <div class="status" id="status" role="status" aria-live="polite"></div>

        <section class="panel is-active" id="username-panel" role="tabpanel" aria-labelledby="username-tab">
          <form class="settings-form" id="username-form">
            <div class="form-field">
              <label for="new-username">新用户名</label>
              <input id="new-username" name="new_username" type="text" autocomplete="username" required>
            </div>

            <button class="primary-button" id="username-submit" type="submit">提交</button>
          </form>
        </section>

        <section class="panel" id="password-panel" role="tabpanel" aria-labelledby="password-tab" hidden>
          <form class="settings-form" id="password-form">
            <div class="form-field">
              <label for="old-password">旧密码</label>
              <input id="old-password" name="old_password" type="password" autocomplete="current-password" required>
            </div>

            <div class="form-field">
              <label for="new-password">新密码</label>
              <input id="new-password" name="new_password" type="password" autocomplete="new-password" required>
            </div>

            <button class="primary-button" id="password-submit" type="submit">提交</button>
          </form>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
