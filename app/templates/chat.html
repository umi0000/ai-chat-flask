<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js" defer></script>
  <script src="{{ url_for('static', filename='js/chat.js') }}" defer></script>
</head>
<body>
  <a class="skip-link" href="#chat-main">跳到聊天区域</a>

  <div class="app-shell" id="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="对话列表">
      <div class="sidebar-header">
        <a class="brand" href="/chat" aria-label="AI Chat 首页">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M7.6 7.1h8.8c1.88 0 3.4 1.52 3.4 3.4v2.1c0 1.88-1.52 3.4-3.4 3.4h-4.18l-3.72 3.1v-3.1h-.9c-1.88 0-3.4-1.52-3.4-3.4v-2.1c0-1.88 1.52-3.4 3.4-3.4Z"/>
              <path d="M8.2 10.4h7.6M8.2 13.1h4.9"/>
            </svg>
          </span>
          <span class="brand-text">AI Chat</span>
        </a>

        <button class="icon-button sidebar-collapse" id="collapse-sidebar" type="button" aria-label="折叠侧边栏" title="折叠侧边栏">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="5" width="16" height="14" rx="3"></rect>
            <path d="M10 5v14"></path>
          </svg>
        </button>
      </div>

      <button class="new-chat-button" id="new-chat" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
        <span>新聊天</span>
      </button>

      <div class="sidebar-section-title">最近</div>
      <div class="conversation-list" id="conversation-list" aria-live="polite"></div>

      <div class="sidebar-footer">
        <button class="user-button" id="settings-link" type="button" aria-label="进入账号设置">
          <span class="avatar" id="user-avatar">U</span>
          <span class="user-meta">
            <span class="username" id="current-username">加载中</span>
            <span class="user-subtitle">账号设置</span>
          </span>
          <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z"></path>
            <path d="M19.4 15a1.75 1.75 0 0 0 .35 1.93l.06.06a2.12 2.12 0 0 1-3 3l-.06-.06a1.75 1.75 0 0 0-1.93-.35 1.75 1.75 0 0 0-1.06 1.6V21.3a2.12 2.12 0 0 1-4.24 0v-.09a1.75 1.75 0 0 0-1.14-1.6 1.75 1.75 0 0 0-1.93.35l-.06.06a2.12 2.12 0 0 1-3-3l.06-.06A1.75 1.75 0 0 0 4 15a1.75 1.75 0 0 0-1.6-1.06H2.3a2.12 2.12 0 0 1 0-4.24h.09A1.75 1.75 0 0 0 4 8.56a1.75 1.75 0 0 0-.35-1.93l-.06-.06a2.12 2.12 0 1 1 3-3l.06.06A1.75 1.75 0 0 0 8.58 4a1.75 1.75 0 0 0 1.06-1.6V2.3a2.12 2.12 0 0 1 4.24 0v.09A1.75 1.75 0 0 0 15 4a1.75 1.75 0 0 0 1.93-.35l.06-.06a2.12 2.12 0 1 1 3 3l-.06.06A1.75 1.75 0 0 0 19.4 8.6a1.75 1.75 0 0 0 1.6 1.06h.09a2.12 2.12 0 0 1 0 4.24H21a1.75 1.75 0 0 0-1.6 1.1Z"></path>
          </svg>
        </button>
      </div>
    </aside>

    <div class="main-pane">
      <header class="topbar">
        <button class="icon-button sidebar-open" id="open-sidebar" type="button" aria-label="展开侧边栏" title="展开侧边栏">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="5" width="16" height="14" rx="3"></rect>
            <path d="M10 5v14"></path>
          </svg>
        </button>
        <div class="topbar-title" id="active-title">新会话</div>
        <select class="model-select" id="model-select" aria-label="选择模型"></select>
      </header>

      <main class="chat-main" id="chat-main" tabindex="-1">
        <div class="messages" id="messages" aria-live="polite"></div>
      </main>

      <footer class="composer-wrap">
        <form class="composer" id="chat-form">
          <textarea id="message-input" rows="1" placeholder="有问题，尽管问。按 Ctrl/Command + Enter 发送" aria-label="输入消息"></textarea>
          <button class="send-button" id="send-button" type="submit" aria-label="发送消息" title="发送">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19V5M5 12l7-7 7 7"></path>
            </svg>
          </button>
        </form>
        <p class="composer-note">AI Chat 也可能会犯错，请核查重要信息。</p>
      </footer>
    </div>
  </div>

  <div class="menu-popover" id="conversation-menu" hidden>
    <button type="button" data-action="rename">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
      </svg>
      <span>重命名</span>
    </button>
    <button class="danger" type="button" data-action="delete">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 6h18"></path>
        <path d="M8 6V4h8v2"></path>
        <path d="M19 6l-1 14H6L5 6"></path>
        <path d="M10 11v5M14 11v5"></path>
      </svg>
      <span>删除</span>
    </button>
  </div>

  <div class="modal-backdrop" id="rename-modal" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="rename-title">
      <h2 id="rename-title">重命名对话</h2>
      <form id="rename-form">
        <label for="rename-input">新标题</label>
        <input id="rename-input" type="text" maxlength="200" required>
        <div class="modal-actions">
          <button class="secondary-button" id="rename-cancel" type="button">取消</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
